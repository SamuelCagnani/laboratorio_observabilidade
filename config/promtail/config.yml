server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
    - targets:
        - localhost
      labels:
        job: varlogs
        __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
    - json:
        expressions:
          log: log
          stream: stream
          time: time
          tag: tag
    - json:
        expressions:
          timestamp: timestamp
          level: level
          event: event
          method: method
          route: route
          status: status
          request_id: request_id
          response_time_ms: response_time_ms
          message: message
        source: log
    - labels:
        level:
        event:
        method:
        route:
        status:
        request_id:
